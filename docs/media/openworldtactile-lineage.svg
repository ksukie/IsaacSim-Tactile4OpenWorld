<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780" role="img" aria-labelledby="title desc">
  <title id="title">OpenWorldTactile V1–V6 research lineage</title>
  <desc id="desc">Evolution from soft-pad contact validation to force estimation, mounted tactile sensing, manipulation integration, and dataset generation.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.55" stop-color="#0b1520"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lineage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pipeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 42px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #f8fafc; letter-spacing: .2px; }
      .subtitle { font: 400 19px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #94a3b8; }
      .badge { font: 600 14px Inter, "Segoe UI", sans-serif; fill: #67e8f9; letter-spacing: 1.4px; }
      .version { font: 700 18px Inter, "Segoe UI", sans-serif; fill: #081018; }
      .stage { font: 700 22px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #f8fafc; }
      .stage-cn { font: 500 16px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #cbd5e1; }
      .detail { font: 400 14px ui-monospace, "Cascadia Code", Consolas, monospace; fill: #94a3b8; }
      .pipe-label { font: 650 16px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #e2e8f0; }
      .pipe-detail { font: 400 13px ui-monospace, "Cascadia Code", Consolas, monospace; fill: #99f6e4; }
      .note { font: 500 14px Inter, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1600" height="780" rx="28" fill="url(#background)"/>
  <rect width="1600" height="780" rx="28" fill="url(#grid)"/>
  <rect x="0" y="0" width="1600" height="7" rx="3.5" fill="url(#lineage)"/>

  <text class="title" x="52" y="70">OpenWorldTactile · V1–V6 Research Lineage</text>
  <text class="subtitle" x="54" y="104">从软体接触验证到机器人挂载、力场重建与数据集生成</text>
  <g transform="translate(1295 47)">
    <rect width="252" height="44" rx="22" fill="#0e2631" stroke="#155e75"/>
    <circle cx="23" cy="22" r="5" fill="#22d3ee"/>
    <text class="badge" x="40" y="27">ACTIVE RESEARCH LINE</text>
  </g>

  <g stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <path d="M272 286 H294"/>
    <path d="M524 286 H546"/>
    <path d="M776 286 H798"/>
    <path d="M1028 286 H1050"/>
    <path d="M1280 286 H1302"/>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(48 154)">
      <rect width="224" height="264" rx="20" fill="#0f1e2a" stroke="#155e75"/>
      <rect x="18" y="18" width="48" height="30" rx="15" fill="#22d3ee"/>
      <text class="version" x="32" y="39">V1</text>
      <text class="stage" x="18" y="88">Contact Baseline</text>
      <text class="stage-cn" x="18" y="119">固定软膜接触验证</text>
      <line x1="18" y1="143" x2="206" y2="143" stroke="#1e3a4a"/>
      <text class="detail" x="18" y="178">UIPC membrane</text>
      <text class="detail" x="18" y="203">indenter + pad</text>
      <text class="detail" x="18" y="228">output: fxyz.npy</text>
    </g>

    <g transform="translate(300 154)">
      <rect width="224" height="264" rx="20" fill="#0d211f" stroke="#0f766e"/>
      <rect x="18" y="18" width="48" height="30" rx="15" fill="#2dd4bf"/>
      <text class="version" x="32" y="39">V2</text>
      <text class="stage" x="18" y="88">Force Core</text>
      <text class="stage-cn" x="18" y="119">力估计核心模块</text>
      <line x1="18" y1="143" x2="206" y2="143" stroke="#164e46"/>
      <text class="detail" x="18" y="178">constitutive force</text>
      <text class="detail" x="18" y="203">conservative splat</text>
      <text class="detail" x="18" y="228">dense local field</text>
    </g>

    <g transform="translate(552 154)">
      <rect width="224" height="264" rx="20" fill="#181b2e" stroke="#6366f1"/>
      <rect x="18" y="18" width="48" height="30" rx="15" fill="#a5b4fc"/>
      <text class="version" x="32" y="39">V3</text>
      <text class="stage" x="18" y="88">Validation</text>
      <text class="stage-cn" x="18" y="119">自动验证套件</text>
      <line x1="18" y1="143" x2="206" y2="143" stroke="#312e81"/>
      <text class="detail" x="18" y="178">press / shear</text>
      <text class="detail" x="18" y="203">texture / unload</text>
      <text class="detail" x="18" y="228">pass-fail summary</text>
    </g>

    <g transform="translate(804 154)">
      <rect width="224" height="264" rx="20" fill="#1d1d24" stroke="#a16207"/>
      <rect x="18" y="18" width="48" height="30" rx="15" fill="#fbbf24"/>
      <text class="version" x="32" y="39">V4</text>
      <text class="stage" x="18" y="88">Robot Mount</text>
      <text class="stage-cn" x="18" y="119">传感器挂载验证</text>
      <line x1="18" y1="143" x2="206" y2="143" stroke="#713f12"/>
      <text class="detail" x="18" y="178">mounted tactile pad</text>
      <text class="detail" x="18" y="203">world -&gt; local</text>
      <text class="detail" x="18" y="228">motion compensation</text>
    </g>

    <g transform="translate(1056 154)">
      <rect width="224" height="264" rx="20" fill="#261821" stroke="#be185d"/>
      <rect x="18" y="18" width="48" height="30" rx="15" fill="#fb7185"/>
      <text class="version" x="32" y="39">V5</text>
      <text class="stage" x="18" y="88">Manipulation</text>
      <text class="stage-cn" x="18" y="119">抓取与插孔接入</text>
      <line x1="18" y1="143" x2="206" y2="143" stroke="#831843"/>
      <text class="detail" x="18" y="178">Piper / Franka</text>
      <text class="detail" x="18" y="203">grasp + insertion</text>
      <text class="detail" x="18" y="228">runtime diagnostics</text>
    </g>

    <g transform="translate(1308 154)">
      <rect width="224" height="264" rx="20" fill="#10231b" stroke="#15803d"/>
      <rect x="18" y="18" width="48" height="30" rx="15" fill="#4ade80"/>
      <text class="version" x="32" y="39">V6</text>
      <text class="stage" x="18" y="88">Dataset Loop</text>
      <text class="stage-cn" x="18" y="119">完整采集链路</text>
      <line x1="18" y1="143" x2="206" y2="143" stroke="#14532d"/>
      <text class="detail" x="18" y="178">RGB + force</text>
      <text class="detail" x="18" y="203">episode metadata</text>
      <text class="detail" x="18" y="228">HDF5 pipeline</text>
    </g>
  </g>

  <g transform="translate(48 474)">
    <rect width="1484" height="218" rx="24" fill="#08131c" stroke="#1e3a4a"/>
    <text class="badge" x="24" y="38">CORE SIGNAL PIPELINE</text>
    <text class="note" x="1238" y="38">mechanics first · rendering second</text>

    <g transform="translate(24 64)">
      <g>
        <rect width="244" height="92" rx="15" fill="url(#pipeline)" stroke="#0891b2"/>
        <text class="pipe-label" x="20" y="37">UIPC Contact</text>
        <text class="pipe-detail" x="20" y="65">membrane + object</text>
      </g>
      <path d="M252 46 H282" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <g transform="translate(292)">
        <rect width="244" height="92" rx="15" fill="#0e2a30" stroke="#0e7490"/>
        <text class="pipe-label" x="20" y="37">Nodal Deformation</text>
        <text class="pipe-detail" x="20" y="65">surf_nodal_pos_w</text>
      </g>
      <path d="M544 46 H574" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <g transform="translate(584)">
        <rect width="244" height="92" rx="15" fill="#112628" stroke="#0f766e"/>
        <text class="pipe-label" x="20" y="37">Constitutive Force</text>
        <text class="pipe-detail" x="20" y="65">vertex reaction force</text>
      </g>
      <path d="M836 46 H866" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <g transform="translate(876)">
        <rect width="244" height="92" rx="15" fill="#172126" stroke="#b45309"/>
        <text class="pipe-label" x="20" y="37">Local Force Field</text>
        <text class="pipe-detail" x="20" y="65">Fx / Fy / Fz</text>
      </g>
      <path d="M1128 46 H1158" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <g transform="translate(1168)">
        <rect width="268" height="92" rx="15" fill="#1a2028" stroke="#4b5563"/>
        <text class="pipe-label" x="20" y="37">Research Outputs</text>
        <text class="pipe-detail" x="20" y="65">RGB · HDF5 · metadata</text>
      </g>
    </g>

    <g transform="translate(24 174)">
      <circle cx="6" cy="6" r="5" fill="#22d3ee"/>
      <text class="note" x="20" y="11">Force field originates from simulated constitutive response; RGB and texture rendering do not define the final force.</text>
    </g>
  </g>

  <text class="note" x="52" y="742">OpenWorldTactile · IsaacSim-Tactile4OpenWorld</text>
  <text class="note" x="1294" y="742">V1–V6 lineage overview</text>
</svg>
