<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#30343b"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#e02121"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 30px Arial, sans-serif; fill: #151922; }
      .subtitle { font: 16px Arial, sans-serif; fill: #4d5563; }
      .label { font: 16px Arial, sans-serif; fill: #20242d; }
      .small { font: 13px Arial, sans-serif; fill: #3d4654; }
      .mono { font: 13px "Courier New", monospace; fill: #242a33; }
      .box { fill: #ffffff; stroke: #b7c0cc; stroke-width: 2; rx: 8; }
      .robot { fill: #eef3ff; stroke: #6b83b5; }
      .xform { fill: #eefaf2; stroke: #5f9d72; }
      .asset { fill: #fff6e8; stroke: #c58a31; }
      .hidden { fill: #f0f1f4; stroke: #8d96a3; stroke-dasharray: 8 6; }
      .visible { fill: #ecfff3; stroke: #2f9e58; }
      .compute { fill: #eaf7ff; stroke: #3a84b8; stroke-dasharray: 4 4; }
      .redline { stroke: #e02121; stroke-width: 7; stroke-linecap: round; marker-end: url(#arrow-red); }
      .arrow { stroke: #30343b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #707987; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="900"/>
  <text class="title" x="60" y="58">OpenWorldTactile UIPC v5_new_3g: Current Mounting and Membrane Names</text>
  <text class="subtitle" x="60" y="88">This diagram follows the current code in OpenWorldTactile_v5_new_3g_back_visual_membrane.py. It is a path/status diagram, not a geometry-scale drawing.</text>

  <rect class="box robot" x="70" y="135" width="590" height="72"/>
  <text class="label" x="92" y="163">Robot mount link</text>
  <text class="mono" x="92" y="188">/World/envs/env_0/Robot/link7</text>

  <rect class="box xform" x="70" y="250" width="590" height="86"/>
  <text class="label" x="92" y="278">Runtime mount frame created by code</text>
  <text class="mono" x="92" y="303">pad_motion_root = mount_link_path + "/UIPC_Pad_MotionFrame"</text>
  <text class="small" x="92" y="325">Local pose from --pad_mount_x/y/z_mm and --pad_mount_quat_wxyz</text>

  <rect class="box asset" x="70" y="380" width="590" height="94"/>
  <text class="label" x="92" y="410">Referenced pad USD asset</text>
  <text class="mono" x="92" y="435">pad_asset_root = pad_motion_root + "/UIPC_Pad"</text>
  <text class="small" x="92" y="457">_reference_pad_asset(stage, asset_usd, pad_asset_root)</text>

  <path class="arrow" d="M365 207 L365 250"/>
  <path class="arrow" d="M365 336 L365 380"/>

  <rect class="box hidden" x="780" y="130" width="650" height="100"/>
  <text class="label" x="805" y="160">A. visual/membrane_camera_surface</text>
  <text class="mono" x="805" y="184">pad_contract["data_visual_target"]</text>
  <text class="small" x="805" y="208">Default 3g display policy: hidden by --hide_pad_camera_surface=True</text>

  <rect class="box visible" x="780" y="275" width="650" height="100"/>
  <text class="label" x="805" y="305">B. visual/membrane_visual_back_mesh</text>
  <text class="mono" x="805" y="329">pad_contract["display_visual_target"]</text>
  <text class="small" x="805" y="353">Default 3g display policy: visible because --hide_pad_visual_back_mesh=False</text>

  <rect class="box compute" x="780" y="420" width="650" height="104"/>
  <text class="label" x="805" y="450">C. simulation/membrane_sim_mesh</text>
  <text class="mono" x="805" y="474">membrane_root = pad_contract["simulation_root"]</text>
  <text class="small" x="805" y="498">UIPC compute membrane. Default 3g display policy: hidden by --hide_uipc_membrane_visual=True</text>

  <path class="arrow" d="M660 428 C710 428, 725 180, 780 180"/>
  <path class="arrow" d="M660 428 C712 428, 724 325, 780 325"/>
  <path class="arrow" d="M660 428 C712 428, 724 472, 780 472"/>

  <rect class="box" x="70" y="555" width="590" height="118"/>
  <text class="label" x="92" y="585">Runtime UIPC objects in 3g</text>
  <text class="mono" x="92" y="610">/World/UIPC_RuntimeMounted/MembraneAnchor</text>
  <text class="mono" x="92" y="634">/World/UIPC_RuntimeMounted/CylinderTool</text>
  <text class="small" x="92" y="658">CylinderTool visual is hidden by default: --hide_uipc_tool_visual=True</text>

  <rect class="box" x="780" y="580" width="650" height="128"/>
  <text class="label" x="805" y="610">Red normal penetration line added to current 3g</text>
  <text class="mono" x="805" y="634">/World/UIPC_RuntimeMounted/DebugMembraneNormal/normal_red</text>
  <text class="small" x="805" y="658">Center: bbox center of current UIPC front face</text>
  <text class="small" x="805" y="682">Direction: uipc_surface_normal_sign * pad-local x, transformed to world</text>

  <line class="redline" x1="895" y1="752" x2="1280" y2="752"/>
  <text class="small" x="805" y="758">Realtime red normal line passes through the soft membrane front-face center</text>

  <rect class="box" x="70" y="735" width="590" height="86"/>
  <text class="label" x="92" y="765">Important 3g facts</text>
  <text class="small" x="92" y="789">3g does not align simulation/membrane_sim_mesh to camera_surface.</text>
  <text class="small" x="92" y="812">3g does not include detached debug pad view or 3h simulation-membrane alignment.</text>
</svg>
